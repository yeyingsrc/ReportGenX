name: Release Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  check_tag_version:
    name: Check Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          node scripts/check-version-sync.js --tag "$TAG_VERSION"

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    needs: check_tag_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            args: "--win --x64 --arm64"
          - os: macos-latest
            platform: mac
            arch: x64
            args: "--mac --x64"
          - os: macos-latest
            platform: mac
            arch: arm64
            args: "--mac --arm64"
          - os: ubuntu-latest
            platform: linux
            arch: x64
            args: "--linux --x64"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.16.0

      - name: Build Python Backend
        working-directory: ./backend
        run: |
          pyinstaller --noconfirm api.spec

      - name: Rollback drill (packaged backend)
        run: python backend/scripts/plugin_runtime_rollback_drill.py

      - name: Ad-hoc sign backend executable (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - backend/dist/api/api
          codesign --verify --verbose backend/dist/api/api || true

      - name: Create output directory (Windows)
        if: runner.os == 'Windows'
        run: if (!(Test-Path "backend/output")) { New-Item -Path "backend/output" -ItemType Directory }
        shell: pwsh

      - name: Create output directory (Unix)
        if: runner.os != 'Windows'
        run: mkdir -p backend/output

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Node dependencies
        run: npm install --no-fund --no-audit

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Build Electron App (Windows with optional signing)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_SIGNING_CERT_PRESENT: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && 'true' || 'false' }}
          WINDOWS_SIGNING_PASSWORD_PRESENT: ${{ (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && 'true' || 'false' }}
          WINDOWS_SIGNING_ENABLED: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && 'true' || 'false' }}
          CSC_LINK: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && (secrets.CSC_LINK || secrets.WIN_CSC_LINK) || '' }}
          CSC_KEY_PASSWORD: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && (secrets.CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD) || '' }}
        run: npm run dist -- ${{ matrix.args }} --publish never

      - name: Build Electron App (non-Windows)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- ${{ matrix.args }} --publish never

      - name: Warn unsigned Windows artifacts (no cert configured)
        if: runner.os == 'Windows'
        env:
          WINDOWS_SIGNING_CERT_PRESENT: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && 'true' || 'false' }}
          WINDOWS_SIGNING_PASSWORD_PRESENT: ${{ (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && 'true' || 'false' }}
          WINDOWS_SIGNING_ENABLED: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && 'true' || 'false' }}
        run: |
          if ($env:WINDOWS_SIGNING_ENABLED -eq 'true') {
            Write-Host "Windows code signing certificate detected; signed build path enabled."
            exit 0
          }

          if ($env:WINDOWS_SIGNING_CERT_PRESENT -eq 'true' -and $env:WINDOWS_SIGNING_PASSWORD_PRESENT -ne 'true') {
            Write-Host "::warning::Windows signing certificate detected but password is missing (CSC_KEY_PASSWORD/WIN_CSC_KEY_PASSWORD)."
            Write-Host "::warning::Falling back to unsigned Windows artifacts to avoid signing-time build failures."
            exit 0
          }

          Write-Host "::warning::Windows code signing certificate is not configured (CSC_LINK/WIN_CSC_LINK)."
          Write-Host "::warning::Release artifacts will be unsigned and may be blocked by SmartScreen/enterprise policies."
        shell: pwsh

      - name: Verify Windows signatures (when cert configured)
        if: runner.os == 'Windows'
        env:
          WINDOWS_SIGNING_ENABLED: ${{ (secrets.CSC_LINK != '' || secrets.WIN_CSC_LINK != '') && (secrets.CSC_KEY_PASSWORD != '' || secrets.WIN_CSC_KEY_PASSWORD != '') && 'true' || 'false' }}
        run: |
          if ($env:WINDOWS_SIGNING_ENABLED -ne 'true') {
            Write-Host "Skipping Windows signature verification because no signing certificate is configured."
            exit 0
          }

          $patterns = @(
            "dist\\ReportGenX-Setup-*.exe",
            "dist\\win-unpacked\\ReportGenX.exe",
            "dist\\win-unpacked\\resources\\backend\\dist\\api\\api.exe",
            "dist\\win-arm64-unpacked\\ReportGenX.exe",
            "dist\\win-arm64-unpacked\\resources\\backend\\dist\\api\\api.exe"
          )

          $files = @()
          foreach ($pattern in $patterns) {
            $matched = @(Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue)
            if ($matched.Count -eq 0) {
              throw "Expected artifact pattern not found: $pattern"
            }
            $files += $matched
          }

          $failed = $false
          foreach ($file in $files | Sort-Object -Property FullName -Unique) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            Write-Host "$($file.FullName) => $($signature.Status)"
            if ($signature.Status -ne 'Valid') {
              $failed = $true
            }
          }

          if ($failed) {
            throw "Windows signature verification failed."
          }
        shell: pwsh

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-${{ matrix.arch }}*.exe
            dist/*-${{ matrix.arch }}*.dmg
            dist/*-${{ matrix.arch }}*.zip
            dist/*-x86_64*.AppImage
            dist/*-amd64*.deb
            dist/*-x86_64*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest yml (Windows only)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest yml (macOS x64 only)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'mac' && matrix.arch == 'x64'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest yml (Linux only)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    name: Update Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Generate Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION"
          
          cat > release.txt <<EOF
          ## 下载地址
          
          ### Windows (不再支持Win7)
          #### 正常版本(推荐)
          - [64位(常用)]($DOWNLOAD_URL/ReportGenX-Setup-$VERSION-x64.exe) | [ARM64(不常用)]($DOWNLOAD_URL/ReportGenX-Setup-$VERSION-arm64.exe)
          
          ### macOS
          - [Apple M芯片]($DOWNLOAD_URL/ReportGenX-$VERSION-arm64.dmg) | [Intel芯片]($DOWNLOAD_URL/ReportGenX-$VERSION-x64.dmg)
          
          ### Linux
          #### DEB包(Debian系) 使用 apt ./路径 安装
          - [64位]($DOWNLOAD_URL/ReportGenX-$VERSION-amd64.deb)
          
          #### RPM包(Redhat系) 使用 dnf ./路径 安装
          - [64位]($DOWNLOAD_URL/ReportGenX-$VERSION-x86_64.rpm)
          
          #### AppImage (通用)
          - [64位]($DOWNLOAD_URL/ReportGenX-$VERSION-x86_64.AppImage)
          
          ### 校验和
          - [latest.yml]($DOWNLOAD_URL/latest.yml)
          - [latest-mac.yml]($DOWNLOAD_URL/latest-mac.yml)
          - [latest-linux.yml]($DOWNLOAD_URL/latest-linux.yml)
          EOF

      - name: Update Release Body
        uses: softprops/action-gh-release@v2
        with:
          body_path: release.txt
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
